name: big-bear-btop
services:
  big-bear-btop:
    container_name: big-bear-btop
    environment:
      - GOTTY_AUTH_ENABLED=true
      - GOTTY_AUTH_PASS=password
      - GOTTY_AUTH_USER=bigbear
    image: bigbeartechworld/big-bear-btop:0.1.4
    labels:
      icon: https://cdn.jsdelivr.net/gh/aristocratos/btop/Img/icon.png
    ports:
      - mode: ingress
        target: 7681
        published: "7681"
        protocol: tcp
    privileged: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: /proc
        target: /proc
        bind:
          create_host_path: true
      - type: bind
        source: /sys
        target: /sys
        bind:
          create_host_path: true
      - type: bind
        source: /dev
        target: /dev
        bind:
          create_host_path: true
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /DATA/AppData/big-bear-btop/config
        target: /root/.config/btop
        bind:
          create_host_path: true
    x-casaos:
      envs:
        - container: GOTTY_AUTH_USER
          description:
            en_us: "Container Environment Variable: GOTTY_AUTH_USER"
        - container: GOTTY_AUTH_PASS
          description:
            en_us: "Container Environment Variable: GOTTY_AUTH_PASS"
        - container: GOTTY_AUTH_ENABLED
          description:
            en_us: "Container Environment Variable: GOTTY_AUTH_ENABLED"
      ports:
        - container: "7681"
      volumes:
        - container: /proc
          description:
            en_us: "Container Path: /proc"
        - container: /sys
          description:
            en_us: "Container Path: /sys"
        - container: /dev
          description:
            en_us: "Container Path: /dev"
        - container: /etc/localtime
          description:
            en_us: "Container Path: /etc/localtime"
        - container: /root/.config/btop
          description:
            en_us: "Container Path: /root/.config/btop"
    devices: []
    cap_add: []
    command: []
    networks:
      - default
    hostname: big-bear-btop
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: 15258M
networks:
  default:
    name: big-bear-btop_default
x-casaos:
  architectures:
    - amd64
    - arm64
  author: BigBearTechWorld
  category: BigBearCasaOS
  description:
    en_us: A monitor of resources. Software made by Aristocratos at
      https://github.com/aristocratos/btop
  developer: bigbeartechworld
  icon: https://cdn.jsdelivr.net/gh/aristocratos/btop/Img/icon.png
  is_uncontrolled: false
  main: big-bear-btop
  port_map: "7681"
  store_app_id: big-bear-btop
  tagline:
    en_us: A monitor of resources
  thumbnail: ""
  tips:
    before_install:
      en_us: >
        Read this before installing:
        https://community.bigbeartechworld.com/t/added-btop-to-bigbearcasaos/1240?u=dragonfire1119
  title:
    en_us: btop
    custom: ""
  hostname: ""
  scheme: http
  index: /
