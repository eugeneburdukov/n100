name: eloquent_dominic
services:
  makemkv:
    cpu_shares: 90
    command: []
    container_name: makemkv
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M
        reservations:
          cpus: "0.5"
          memory: "536870912"
    environment:
      - GROUP_ID=1000
      - MAKEMKV_KEY=BETA
      - TZ=Europe/Kyiv
      - USER_ID=1000
    hostname: makemkv
    image: jlesage/makemkv:latest
    labels:
      icon: https://icon.casaos.io/main/all/makemkv.png
    ports:
      - target: 5800
        published: "5156"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/eugeneb/homeAppData/AppData/makemkv/config
        target: /config
      - type: bind
        source: /DATA/Media
        target: /Media
      - type: bind
        source: /DATA/Media
        target: /satamedialibrary
      - type: bind
        source: /DATA/Media
        target: /t9medialibrary
      - type: bind
        source: /DATA/Media
        target: /m2medialibrary
      - type: bind
        source: /mnt/ssd2tb/ssd2tbmedialibrary/ssd2tbdownloads
        target: /ssd2tbdownloads
      - type: bind
        source: /opt/vc/lib
        target: /opt/vc/lib
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://icon.casaos.io/main/all/makemkv.png
  index: /
  is_uncontrolled: false
  port_map: "5156"
  scheme: http
  store_app_id: eloquent_dominic
  title:
    custom: ""
    en_us: makemkv
