name: stirring_gzevd
services:
  mermaid-live-editor:
    cpu_shares: 90
    command: []
    container_name: mermaid-live-editor
    deploy:
      resources:
        limits:
          memory: 15258M
    environment:
      - NODE_ENV=production
    hostname: mermaid-live-editor
    image: ghcr.io/mermaid-js/mermaid-live-editor:latest
    labels:
      icon: https://icon.casaos.io/main/all/mermaid-live-editor.png
    ports:
      - target: 8080
        published: "8484"
        protocol: tcp
    restart: unless-stopped
    volumes: []
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://icon.casaos.io/main/all/mermaid-live-editor.png
  index: /
  is_uncontrolled: false
  port_map: "8484"
  scheme: http
  store_app_id: stirring_gzevd
  title:
    custom: ""
    en_us: mermaid-live-editor
